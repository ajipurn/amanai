# Root config for repo-wide tooling (ruff + pytest). Each service/package keeps
# its own pyproject for dependencies; this file only configures linting & tests.

[tool.ruff]
line-length = 100
target-version = "py310"  # match the SDK's requires-python floor
extend-exclude = ["migrations", ".venv", "node_modules"]

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["E501"]  # line length is handled by the formatter

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["packages/sdk-python"]
addopts = "-q"
