[project]
name = "amanai"
dynamic = ["version"]
description = "Action Policy Engine for AI agents: policy-as-code for tool-calls — evaluate, enforce (block/warn/approve), and trace agent actions, with the same policy asserted in CI. Plus local guardrails and an offline judge. Pure-Python, zero dependencies."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "Aji Purnomo", email = "hi@aji.is-a.dev" }]
keywords = ["ai", "agent", "security", "llm", "guardrails", "prompt-injection", "pii", "tool-call", "owasp", "policy-as-code"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.version]
path = "amanai/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["amanai"]
