name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Ruff lint
        run: uvx ruff@0.8.4 check .
      - name: Ruff format (advisory)
        run: uvx ruff@0.8.4 format --check .
        continue-on-error: true

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Run tests
        run: uvx --python 3.10 --with pytest pytest
      - name: Red-team regression pack
        run: uv run --with ./packages/sdk-python amanai redteam

  node-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
