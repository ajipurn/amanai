name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Ruff lint
        run: uvx ruff@0.8.4 check .
      - name: Ruff format (advisory)
        run: uvx ruff@0.8.4 format --check .
        continue-on-error: true

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Run tests
        run: uvx --python 3.10 --with pytest pytest
